<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access your personal dividend trackers">
    <meta name="theme-color" content="#0a0e14">
    <title>Dividend Tracker Login</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0e14;
            --surface: #111621;
            --surface-alt: #161d2b;
            --border: #1e2840;
            --green: #34d399;
            --green-dim: #1a4a35;
            --green-glow: rgba(52,211,153,0.15);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #475569;
            --red: #f87171;
            --red-surface: #2a1515;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo img {
            height: 48px;
            width: 48px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .logo p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .modal h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.55;
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 10px;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .field-row {
            display: flex;
            align-items: center;
            background: var(--surface-alt);
            border-radius: 9px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .field-row input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 15px;
            padding: 10px 12px;
            font-family: inherit;
        }

        .field-row input::placeholder {
            color: var(--text-dim);
        }

        .error {
            color: var(--red);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, var(--green), #10b981);
            border: none;
            border-radius: 9px;
            color: #0a0e14;
            padding: 11px 0;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 18px var(--green-glow);
            transition: opacity 0.15s;
            font-family: inherit;
            margin-top: 8px;
        }

        .btn-primary:hover {
            opacity: 0.82;
        }

        .btn-back {
            width: 100%;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text-muted);
            padding: 11px 0;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            margin-top: 8px;
        }

        .btn-back:hover {
            background: var(--border);
            color: var(--text);
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            background: linear-gradient(135deg, var(--green), #10b981);
            border: none;
            border-radius: 9px;
            color: #0a0e14;
            padding: 16px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 18px var(--green-glow);
            transition: all 0.15s;
            font-family: inherit;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-btn:hover {
            opacity: 0.82;
            transform: translateY(-2px);
        }

        .menu-btn span {
            font-size: 20px;
        }

        #loginModal,
        #menuModal {
            display: none;
        }

        #loginModal.show,
        #menuModal.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <img src="images/app-icon.png" alt="Dividend Tracker">
        <h1>Dividend Tracker</h1>
        <p>Access Your Personal Trackers</p>
    </div>

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="modal show">
        <h2>Enter Password</h2>
        <p>Access your personal dividend trackers.</p>
        <div class="field">
            <div class="field-row">
                <input type="password" id="pwInput" placeholder="Password" onkeypress="if(event.key==='Enter')checkPw()">
            </div>
        </div>
        <div id="pwErr" class="error">Incorrect password. Please try again.</div>
        <button class="btn-primary" onclick="checkPw()">Submit</button>
        <div style="margin-top: 16px; display: flex; justify-content: center; gap: 16px;">
            <a href="index.html" style="text-decoration: none; color: var(--text-muted); font-size: 12px; transition: color 0.15s;">← Home</a>
            <a href="blog.html" style="text-decoration: none; color: var(--text-muted); font-size: 12px; transition: color 0.15s;">Blog</a>
        </div>
    </div>

    <!-- MENU MODAL -->
    <div id="menuModal" class="modal">
        <h2>Welcome!</h2>
        <p>Select which tracker you'd like to access:</p>
        <div class="menu-buttons">
            <button class="menu-btn" onclick="window.location.href='divtrack-personal.html'">
                <span>💰 Dividend Goals</span>
                <span>→</span>
            </button>
            <button class="menu-btn" onclick="window.location.href='dividend-tracker.html'">
                <span>📊 Dividend Tracker</span>
                <span>→</span>
            </button>
            <button class="menu-btn" style="background: var(--surface-alt); color: var(--text-muted); box-shadow: none; border: 1px solid var(--border);" onclick="window.location.href='blog.html'">
                <span>📝 Blog</span>
                <span>→</span>
            </button>
        </div>
        <button class="btn-back" onclick="logout()">Logout</button>
    </div>
</div>

<script>
function checkPw(){
    const h = CryptoJS.SHA256(document.getElementById('pwInput').value).toString();
    if(h==='d5378a00c61377598c6f3dc4a00d4507b68f7e214bbee32ac241d6957aa0b7bd'){
        // Store login time for 24 hours
        const now = new Date();
        sessionStorage.setItem('loginTime', now.getTime());
        document.getElementById('loginModal').classList.remove('show');
        document.getElementById('menuModal').classList.add('show');
    } else {
        document.getElementById('pwErr').classList.add('show');
        document.getElementById('pwInput').value='';
        document.getElementById('pwInput').focus();
    }
}

function logout(){
    sessionStorage.removeItem('loginTime');
    document.getElementById('loginModal').classList.add('show');
    document.getElementById('menuModal').classList.remove('show');
    document.getElementById('pwInput').value='';
    document.getElementById('pwErr').classList.remove('show');
    document.getElementById('pwInput').focus();
}

// Check if already logged in (within 24 hours)
window.addEventListener('load', () => {
    const loginTime = sessionStorage.getItem('loginTime');
    if (loginTime) {
        const now = new Date().getTime();
        const elapsed = now - parseInt(loginTime);
        const twentyFourHours = 24 * 60 * 60 * 1000;
        
        if (elapsed < twentyFourHours) {
            // Still logged in
            document.getElementById('loginModal').classList.remove('show');
            document.getElementById('menuModal').classList.add('show');
        } else {
            // Session expired
            sessionStorage.removeItem('loginTime');
        }
    }
    document.getElementById('pwInput').focus();
});
</script>

</body>
</html>
